    root.appendChild(renderShell());
    if (state.showWelcome) root.appendChild(renderWelcome());

  function renderWelcome(){
    var name = (state.session && state.session.name) || '';
    var title = renderVars(area.welcomeTitle || DEFAULT_WELCOME_TITLE, name);
    var msg = renderVars(area.welcomeMessage || DEFAULT_WELCOME_MESSAGE, name);
    var btnLabel = area.welcomeButtonLabel || DEFAULT_WELCOME_BUTTON;

    var termsLabel = area.welcomeTermsLabel || DEFAULT_WELCOME_TERMS;

    var box = document.createElement('div'); box.className = 'tm-welcome';
    box.innerHTML =
      '<h2>'+esc(title)+'</h2>'+
      '<div class="msg">'+esc(msg)+'</div>'+

  function renderAuth(){

    wrap.className = 'tm-auth-wrap';

    var instructions = area.loginInstructions || 'Digite seu nome, e-mail e a senha de acesso enviada junto com sua compra.';
    var wa = (area.supportWhatsapp || '').replace(/\D/g, '');
    var showSup = (area.supportEmailEnabled && area.supportEmail) || (area.supportWhatsappEnabled && wa);
    var supportHtml = '';
    if (showSup) {
      var parts = [];
      if (area.supportEmailEnabled && area.supportEmail)
        parts.push('<a href="mailto:'+esc(area.supportEmail)+'" style="color:'+ACCENT+';text-decoration:none;display:inline-flex;align-items:center;gap:6px">✉ '+esc(area.supportEmail)+'</a>');
      if (area.supportWhatsappEnabled && wa)
        parts.push('<a href="https://wa.me/'+wa+'" target="_blank" rel="noreferrer" style="color:'+ACCENT+';text-decoration:none;display:inline-flex;align-items:center;gap:6px">💬 WhatsApp</a>');
      supportHtml = '<div style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;display:grid;gap:8px">'

        + '<div style="display:flex;flex-wrap:wrap;gap:12px">'+parts.join('')+'</div>'
        + '</div>';

    var notice = (area.loginAccessNotice == null) ? 'Acesso individual. Não compartilhe seus dados de acesso.' : area.loginAccessNotice;
    var noticeHtml = (notice && notice.replace(/\s/g,'').length)
      ? '<div class="tm-warn">'+icons.shield+'<span>'+esc(notice)+'</span></div>'
      : '';
    var card = document.createElement('div'); card.className = 'tm-card';

      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">' +

        '<div><div style="font-size:18px;font-weight:700;letter-spacing:-.01em">'+esc(displayName)+'</div><div style="font-size:11px;opacity:.7">'+esc(tagline)+'</div></div>' +
      '</div>' +

  function fld(icon, attrs){
    var w = document.createElement('div'); w.className = 'tm-input-wrap';
    w.innerHTML = icon || '';
    var i = document.createElement('input'); i.className = 'tm-input';
    Object.keys(attrs).forEach(function(k){ i.setAttribute(k, attrs[k]); });
    w.appendChild(i); return { wrap: w, input: i };
  }

  function renderLoginForm(host, instructions){
    host.innerHTML = '';
    var f = document.createElement('form'); f.className = 'tm-grid';
    var title = document.createElement('div'); title.style.cssText='font-size:20px;font-weight:700'; title.textContent='Acessar';
    var hint = document.createElement('div'); hint.style.cssText='font-size:13px;opacity:.8;line-height:1.5'; hint.textContent = instructions;
    var name = fld(icons.user, { required:'true', placeholder:'Nome completo' });
    var email = fld(icons.mail, { type:'email', required:'true', placeholder:'E-mail' });
    var pwd = fld(icons.lock, { type:'password', required:'true', placeholder:'Senha de acesso' });
    var err = document.createElement('div'); err.className = 'tm-err';
    if (state.error) err.textContent = state.error;
    var btn = document.createElement('button'); btn.className='tm-primary'; btn.type='submit'; btn.textContent='Entrar';
    f.appendChild(title); f.appendChild(hint);
    f.appendChild(name.wrap); f.appendChild(email.wrap); f.appendChild(pwd.wrap);
    f.appendChild(err); f.appendChild(btn);
    f.addEventListener('submit', function(e){
      e.preventDefault();
      state.error = '';
      var expected = (area.accessPassword || '').trim();
      if (!expected) {
        state.error = 'A senha de acesso ainda não foi configurada pelo administrador.';
        toast('Senha de acesso não configurada.', 'error'); render(); return;
      }
      if (pwd.input.value.trim() !== expected) {
        state.error = 'Senha de acesso incorreta. Confira a senha enviada junto com sua compra.';
        toast('Senha de acesso incorreta.', 'error'); render(); return;
      }
      var u = { id: Math.random().toString(36).slice(2), name: name.input.value.trim(), email: email.input.value.trim(), createdAt: Date.now() };
      state.session = u; write(SESS, u);
      try {
        if (area.welcomePopupEnabled && !localStorage.getItem(WELC)) {
          state.showWelcome = true;
        }
      } catch(e){}
      render();
    });
    host.appendChild(f);
  }

  function renderShell(){
    var shell = document.createElement('div');
    shell.appendChild(renderHeader());
    if (state.view === 'home') shell.appendChild(renderHome());
    else shell.appendChild(renderLesson(state.lessonId));
    var foot = document.createElement('footer'); foot.className='tm-footer';
    shell.appendChild(foot);
    return shell;

  function renderHeader(){
    var head = document.createElement('header'); head.className='tm-header';
    var brand = document.createElement('button'); brand.className='tm-brand';
    var brandLogo = area.loginLogoUrl || area.logoUrl;
    brand.innerHTML = (brandLogo ? '<img src="'+esc(brandLogo)+'" alt="" style="height:28px" />' : '<div class="tm-logo-fallback"></div>') + '<span>'+esc(area.name)+'</span>';
    brand.onclick = function(){ state.view='home'; render(); };

    var right = document.createElement('div'); right.style.cssText='display:flex;align-items:center;gap:12px;position:relative';
    var firstName = esc((state.session.name||'').split(' ')[0]);
    var initial = esc((state.session.name||'?').charAt(0).toUpperCase());

    var prof = document.createElement('button'); prof.className='tm-profile-btn';
    prof.innerHTML = '<span class="tm-avatar">'+initial+'</span><span style="opacity:.9">Olá, '+firstName+'</span>';

    var out = document.createElement('button'); out.className='tm-sm-btn'; out.innerHTML = icons.out + ' Sair';
    out.onclick = function(){ state.session=null; localStorage.removeItem(SESS); state.view='home'; render(); };

    menu.innerHTML =

      '<div style="font-size:12px;opacity:.7;margin-bottom:6px;word-break:break-all">'+esc(state.session.email)+'</div>';
    var outM = document.createElement('button'); outM.className='tm-menu-btn'; outM.innerHTML = icons.out + ' Sair';
    menu.appendChild(outM);
    outM.onclick = out.onclick;

    prof.onclick = function(e){
      e.stopPropagation();
      var open = menu.style.display !== 'none';
      menu.style.display = open ? 'none' : 'block';
      if (!open) {
        setTimeout(function(){
          var off = function(){ menu.style.display='none'; document.removeEventListener('click', off); };
          document.addEventListener('click', off);
        }, 0);
      }
    };
    menu.addEventListener('click', function(e){ e.stopPropagation(); });

    right.appendChild(prof); right.appendChild(out); right.appendChild(menu);
    head.appendChild(brand); head.appendChild(right);
    return head;
  }




  function renderHome(){
    var wrap = document.createElement('div');
    var hero = document.createElement('div'); hero.className='tm-hero';
    var heroImgEl = null;
    var img = area.bannerDesktop || area.bannerMobile;
    function applyHeroBg(){
      var isMobile = window.innerWidth < 768;
      var src = isMobile ? (area.bannerMobile || area.bannerDesktop) : (area.bannerDesktop || area.bannerMobile);
      if (src) {
        if (!heroImgEl) {
          heroImgEl = document.createElement('img');
          heroImgEl.className = 'tm-hero-img';
          heroImgEl.alt = '';
          hero.insertBefore(heroImgEl, hero.firstChild);
        }
        if (heroImgEl.getAttribute('src') !== src) heroImgEl.setAttribute('src', src);
      } else {
        hero.style.background = 'linear-gradient(135deg, '+ACCENT+'55, transparent), #15151c';
      }
    }
    applyHeroBg();
    window.addEventListener('resize', applyHeroBg);
    if (area.showBannerText) {
      var overlay = document.createElement('div');
      overlay.className = 'tm-hero-overlay';
      overlay.innerHTML =
        '<div style="max-width:720px;width:100%">' +
          (area.title ? '<h1>'+esc(area.title)+'</h1>' : '') +
          (area.subtitle ? '<p>'+esc(area.subtitle)+'</p>' : '') +
          (area.ctaUrl && area.ctaLabel ? '<a class="tm-cta" href="'+esc(area.ctaUrl)+'" target="_blank" rel="noreferrer">'+esc(area.ctaLabel)+'</a>' : '') +
        '</div>';
      hero.appendChild(overlay);
    }
    wrap.appendChild(hero);

    var bgC = area.theme === 'light' ? '#fafafa' : '#0c0c10';
    var blur = document.createElement('div'); blur.className='tm-blur';
    blur.style.background = 'linear-gradient(180deg, transparent 0%, '+bgC+'cc 60%, '+bgC+' 100%)';
    wrap.appendChild(blur);

    var content = document.createElement('div'); content.className='tm-content';

    // Progress card removed per design update.

    var any = false;
    sections.forEach(function(sec){
      var mods = modules.filter(function(m){ return m.sectionId === sec.id; });
      if (mods.length === 0) return;
      any = true;
      content.appendChild(renderCarousel(sec, mods));
    });
    if (!any) {
      var empty = document.createElement('div'); empty.style.cssText='text-align:center;padding:60px;opacity:.6'; empty.textContent='Em breve, novos conteúdos.'; content.appendChild(empty);
    }

  function renderCarousel(sec, mods){
    var showTitle = area.showModuleTitle !== false;
    var sec_ = document.createElement('section'); sec_.className='tm-section';
    var head = document.createElement('div'); head.className='tm-section-head';
    head.innerHTML = '<h2>'+esc(sec.name)+'</h2>';
    var navs = document.createElement('div'); navs.className='tm-navs hidden';
    var pL = document.createElement('button'); pL.className='tm-nav'; pL.innerHTML=icons.chevL; pL.setAttribute('aria-label','Anterior');
    var pR = document.createElement('button'); pR.className='tm-nav'; pR.innerHTML=icons.chevR; pR.setAttribute('aria-label','Próximo');
    navs.appendChild(pL); navs.appendChild(pR); head.appendChild(navs);
    var track = document.createElement('div'); track.className='tm-track';
    function step(dir){
      var card = track.querySelector('.tm-mod');
      var s = card ? (card.offsetWidth + 16) : 320;
      track.scrollBy({ left: dir * s * 2, behavior:'smooth' });
    }
    pL.onclick = function(){ step(-1); };
    pR.onclick = function(){ step(1); };
    function measure(){
      var overflow = track.scrollWidth - track.clientWidth > 4;
      navs.className = 'tm-navs' + (overflow ? '' : ' hidden');
      var canPrev = overflow && track.scrollLeft > 4;
      var canNext = overflow && track.scrollLeft < track.scrollWidth - track.clientWidth - 4;
      if (canPrev) pL.removeAttribute('disabled'); else pL.setAttribute('disabled','');
      if (canNext) pR.removeAttribute('disabled'); else pR.setAttribute('disabled','');
    }
    track.addEventListener('scroll', measure, { passive: true });
    window.addEventListener('resize', measure);
    mods.forEach(function(m){
      var first = lessons.filter(function(l){ return l.moduleId === m.id; }).sort(function(a,b){return a.order-b.order;})[0];
      var mShow = showTitle && (m.showTitle !== false);
      var card = document.createElement('button'); card.className='tm-mod' + (mShow ? '' : ' notitle');
      var bg = m.coverUrl ? 'url('+m.coverUrl+') center/cover no-repeat' : 'linear-gradient(135deg, '+ACCENT+', #2a2a40)';
      var body = mShow ? '<div class="tm-mod-body"><div class="t">'+esc(m.title)+'</div></div>' : '';
      card.innerHTML = '<div class="tm-mod-cover" style="background:'+bg+'"></div>' + body;
      if (first) card.onclick = function(){ state.view='lesson'; state.lessonId=first.id; render(); window.scrollTo(0,0); };
      track.appendChild(card);
    });
    sec_.appendChild(head); sec_.appendChild(track);
    setTimeout(measure, 50);
    setTimeout(measure, 400);
    return sec_;
  }

  // Flat ordered list of all lessons in the area (section → module → lesson order)
  function flatLessons(){
    var out = [];
    sections.slice().sort(function(a,b){return a.order-b.order;}).forEach(function(sec){
      modules.filter(function(m){return m.sectionId===sec.id;}).sort(function(a,b){return a.order-b.order;}).forEach(function(m){
        lessons.filter(function(l){return l.moduleId===m.id;}).sort(function(a,b){return a.order-b.order;}).forEach(function(l){ out.push(l); });
      });
    });
    return out;
  }

  function buildSideList(lesson){
    var currentModule = modules.find(function(m){return m.id===lesson.moduleId;});
    var modLessons = lessons.filter(function(l){return l.moduleId===lesson.moduleId;}).sort(function(a,b){return a.order-b.order;});
    var modDone = modLessons.filter(function(l){return state.progress[l.id];}).length;
    var box = document.createElement('div');
    var head = '<div class="hd">Lista de aulas</div>';
    if (currentModule) head += '<div class="mt">'+esc(currentModule.title)+'<small>'+modDone+'/'+modLessons.length+' concluídas</small></div>';
    box.innerHTML = head;
    modLessons.forEach(function(l, i){
      var active = l.id === lesson.id;
      var ok = !!state.progress[l.id];
      var b = document.createElement('button');
      b.className = 'tm-side-item' + (active?' active':'') + (ok?' done':'');
      b.innerHTML = '<span class="dot">'+(ok?icons.check:(i+1))+'</span><span style="flex:1">'+esc(l.title||('Aula '+(i+1)))+'</span>';
      b.onclick = function(){ state.lessonId = l.id; render(); window.scrollTo(0,0); };
      box.appendChild(b);
    });
    return box;
  }

  function renderLesson(id){
    var lesson = lessons.find(function(l){ return l.id === id; });
    if (!lesson) { var d = document.createElement('div'); d.style.padding='24px'; d.textContent='Aula não encontrada.'; return d; }
    var flat = flatLessons();
    var fi = flat.findIndex(function(l){return l.id===lesson.id;});
    var prev = flat[fi-1], next = flat[fi+1];
    var done = !!state.progress[lesson.id];

    var wrap = document.createElement('div'); wrap.className='tm-lesson-wrap';
    var main = document.createElement('div'); main.className='tm-lesson-main';

    var back = document.createElement('button'); back.className='tm-back';
    back.innerHTML = icons.back+' Voltar para módulos';
    back.onclick = function(){ state.view='home'; render(); window.scrollTo(0,0); };
    main.appendChild(back);

    var media = document.createElement('div'); media.className='media';
    var isVideo = lesson.payload && (lesson.payload.type === 'youtube' || lesson.payload.type === 'vimeo');
    var mod = modules.find(function(mm){ return mm.id === lesson.moduleId; });
    var cover = lesson.coverUrl || (mod && mod.coverUrl);
    if (isVideo) {
      media.appendChild(renderLessonContent(lesson));
    } else {
      if (cover) {
        var cv = document.createElement('div');
        cv.className = 'tm-iframe';
        cv.style.background = 'url('+cover+') center/cover no-repeat, #000';
        cv.style.marginBottom = '18px';
        media.appendChild(cv);
      }
      media.appendChild(renderLessonContent(lesson));
    }
    main.appendChild(media);

    var h1 = document.createElement('h1'); h1.textContent = lesson.title; main.appendChild(h1);

    var desc = (lesson.payload && lesson.payload.description) || '';
    if (desc && lesson.payload.type !== 'rich') {
      var dd = document.createElement('div'); dd.className='tm-rich'; dd.innerHTML = desc;
      main.appendChild(dd);
    }

    if (lesson.materials && lesson.materials.length) {
      var sec = document.createElement('section'); sec.style.marginTop='28px';
      sec.innerHTML = '<h3 style="font-size:12px;text-transform:uppercase;letter-spacing:.12em;opacity:.65;margin:0 0 4px">Entregáveis & Materiais</h3>';
      var list = document.createElement('div'); list.className='tm-mats';
      lesson.materials.forEach(function(m){
        var a = document.createElement('a'); a.href=m.url; a.target='_blank'; a.rel='noreferrer'; a.className='tm-mat';
        a.innerHTML = '<div class="ico">'+icons.download+'</div><div class="info"><div class="t">'+esc(m.label||'Material')+'</div><div class="s">Baixar / abrir</div></div>'+icons.ext;
        list.appendChild(a);
      });
      sec.appendChild(list); main.appendChild(sec);
    }

    var act = document.createElement('div'); act.className='tm-actions';
    var pb = document.createElement('button'); pb.className='tm-back'; pb.style.margin='0';
    pb.innerHTML=icons.chevL+' Aula anterior';
    if (!prev) { pb.setAttribute('disabled',''); pb.style.opacity='.35'; pb.style.cursor='default'; }
    else pb.onclick=function(){ state.lessonId=prev.id; render(); window.scrollTo(0,0); };
    act.appendChild(pb);

    var doneBtn = document.createElement('button'); doneBtn.className='tm-done';
    doneBtn.style.background = done ? 'rgba(255,255,255,.1)' : ACCENT;
    doneBtn.style.boxShadow = done ? 'none' : '0 10px 30px -10px '+ACCENT+'88';
    doneBtn.innerHTML = done ? (icons.check+' Concluída') : 'Marcar como concluída';
    doneBtn.onclick = function(){
      if (!state.progress[lesson.id]) { state.progress[lesson.id]=true; write(PROG, state.progress); }
      if (next) { setTimeout(function(){ state.lessonId=next.id; render(); window.scrollTo(0,0); }, 80); }
      else render();
    };
    act.appendChild(doneBtn);
    var spacer = document.createElement('div'); spacer.style.flex='1'; act.appendChild(spacer);

    var nb = document.createElement('button'); nb.className='tm-back'; nb.style.margin='0';
    nb.innerHTML='Próxima aula '+icons.chevR;
    if (next) { nb.style.background = ACCENT+'22'; nb.style.borderColor = ACCENT+'66'; nb.onclick=function(){ state.lessonId=next.id; render(); window.scrollTo(0,0); }; }
    else { nb.setAttribute('disabled',''); nb.style.opacity='.35'; nb.style.cursor='default'; }
    act.appendChild(nb);
    main.appendChild(act);

    var aside = document.createElement('aside'); aside.className='tm-side';
    aside.appendChild(buildSideList(lesson));

    wrap.appendChild(main); wrap.appendChild(aside);

    // Mobile drawer
    var fab = document.createElement('button'); fab.className='tm-side-fab'; fab.setAttribute('aria-label','Lista de aulas'); fab.innerHTML=icons.list;
    var drawer = document.createElement('div'); drawer.className='tm-side-drawer';
    var inner = document.createElement('div'); inner.className='tm-side-drawer-inner';
    var close = document.createElement('button'); close.className='tm-back'; close.innerHTML=icons.x+' Fechar';
    close.onclick=function(){ drawer.classList.remove('open'); };
    inner.appendChild(close); inner.appendChild(buildSideList(lesson));
    drawer.appendChild(inner);
    drawer.onclick=function(e){ if (e.target===drawer) drawer.classList.remove('open'); };
    fab.onclick=function(){ drawer.classList.add('open'); };
    wrap.appendChild(fab); wrap.appendChild(drawer);

    return wrap;
  }

  function renderLessonContent(lesson){
    var p = lesson.payload || {};
    if (p.type === 'youtube') {
      var id = ytId(p.url);
      if (id) return youtubePlayer(id, p.url, lesson.title || 'Aula');
      return extCard(p.url);
    }
    if (p.type === 'vimeo') {
      var id2 = vimeoId(p.url);
      if (id2) { var d2 = document.createElement('div'); d2.className='tm-iframe'; d2.innerHTML='<iframe src="https://player.vimeo.com/video/'+id2+'" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>'; return d2; }
      return extCard(p.url);
    }
    if (p.type === 'pdf') { var d3 = document.createElement('div'); d3.className='tm-pdf'; d3.innerHTML='<iframe src="'+esc(p.url)+'"></iframe>'; return d3; }
    if (p.type === 'link') return extCard(p.url);
    if (p.type === 'rich') { var d4 = document.createElement('div'); d4.className='tm-rich'; d4.innerHTML = p.html || ''; return d4; }
    if (p.type === 'buttons') {
      var w = document.createElement('div'); w.style.display='grid'; w.style.gap='10px';
      (p.buttons||[]).forEach(function(b){ var a=document.createElement('a'); a.className='tm-btn-link'; a.href=b.url; a.target='_blank'; a.rel='noreferrer'; a.textContent=b.label; w.appendChild(a); });
      return w;
    }
    return document.createElement('div');
  }

  function youtubePlayer(id, originalUrl, title){
    var watchUrl = youtubeWatchUrl(id, originalUrl);
    if (location.protocol === 'file:') {
      var card = document.createElement('div');
      card.className = 'tm-yt-card';
      card.innerHTML = '<div class="yt-inner"><div class="yt-play">▶</div><div class="yt-title"></div><button type="button" class="yt-btn">Assistir aula</button></div>';
      card.querySelector('.yt-title').textContent = title || 'Aula';
      card.querySelector('.yt-btn').addEventListener('click', function(){ window.open(watchUrl, '_blank', 'noopener'); });
      return card;
    }
    var box = document.createElement('div');
    box.className = 'tm-iframe';
    var iframe = document.createElement('iframe');
    iframe.src = 'https://www.youtube.com/embed/' + id + '?rel=0&modestbranding=1&playsinline=1';
    iframe.title = title;
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
    iframe.referrerPolicy = 'strict-origin-when-cross-origin';
    iframe.allowFullscreen = true;
    box.appendChild(iframe);
    return box;
  }





  function extCard(url){
    var a = document.createElement('a'); a.className='tm-material'; a.href=url; a.target='_blank'; a.rel='noreferrer';
    a.innerHTML = '<span style="display:flex;gap:10px;align-items:center"><span style="width:42px;height:42px;border-radius:10px;background:'+ACCENT+';display:grid;place-items:center;color:#fff">▶</span><span><div style="font-weight:600">Abrir link externo</div><div style="font-size:12px;opacity:.7;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(url)+'</div></span></span>'+icons.ext;
    return a;
  }

  render();
})();
</script>
</body>
</html>
